[engine]
turn_timeout_ms = 200
max_turns = 50

[game]
default_opponent = "greedy"

[analysis]
enable_ai = false
enable_static_analysis = true
ruff_select = ["E", "F", "W"]

[ui]
tile_size = 40
map_padding = 24
map_top = 16
window_width = 1024
window_height = 800
margin_x = 48
label_font_pt = 14
hud_title_pt = 24
hud_body_pt = 18
hud_line_spacing = 24
center_title_pt = 28
center_subtitle_pt = 16
footer_pt = 15
menu_hint_pt = 15

[ui.theme]
asset_manifest = "ui/assets/manifest.toml"
use_sliced_assets = false
game_font = "ui/assets/fonts/Skranji-Bold.ttf"
code_font = "ui/assets/fonts/FantasqueSansMNerdFontMono-Regular.ttf"

[ui.coach]
max_quest_cards = 12
code_panel_font_pt = 14
