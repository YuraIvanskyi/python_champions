[scenario]
id = "resource_wars"
name = "Resource Wars"
map_width = 8
map_height = 8
resource_count = 12
obstacle_count = 8
score_threshold = 15
max_turns = 300
# Classroom / multi-bot (Phase 2.7): simultaneous agents on one map
min_players = 2
max_players = 8
# Multi-bot matches are students-only (no built-in AI). Single `--bot` still adds one AI opponent.
student_only_extra_players = true
